name: Deploy App

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: 3.228.25.62   # your EC2 IP
        username: ec2-user
        key: ${{ secrets.SSH_KEY }}
        script: |
          sudo cp index.html /var/www/html/index.html
          sudo systemctl restart httpd
