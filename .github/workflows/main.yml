name: Deploy App

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /home/ec2-user

          # Clone repo if not exists, else pull latest code
          if [ ! -d "devops-cicd-ec2" ]; then
            git clone https://github.com/dhruvdxb/devops-cicd-ec2.git
          else
            cd devops-cicd-ec2 && git pull
          fi

          cd devops-cicd-ec2

          # Ensure web directory exists
          sudo mkdir -p /var/www/html

          # Copy latest app files
          sudo cp index.html /var/www/html/index.html

          # Install Apache only if not installed
          if ! command -v httpd &> /dev/null; then
            sudo yum install -y httpd
          fi

          # Restart and enable Apache
          sudo systemctl restart httpd
          sudo systemctl enable httpd

          # Deployment log
          echo "Deployment successful at $(date)" >> /home/ec2-user/deploy.log
